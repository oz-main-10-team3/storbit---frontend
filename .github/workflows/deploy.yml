name: Deploy To S3 And Invalidate Cloudfront

on:
  push:
    branches:
      - develop

jobs:
  deploy-S3: # job 의 이름을 작성 아무이름 작성가능
    runs-on: ubuntu-latest
    steps:
      - name: Github Repository 파일 불러오기
        uses: actions/checkout@v4 # githubmarketplace 라이브러리 사용

      - name: VITE_API_MAIN_URL 값을 .env.production 파일로 만들기
        run: |
          echo "VITE_KAKAO_CLIENT_ID=${{ secrets.VITE_KAKAO_CLIENT_ID }}" >> .env.production
          echo "VITE_KAKAO_REDIRECT_URI=${{ secrets.VITE_KAKAO_REDIRECT_URI }}" >> .env.production
          echo "VITE_API_MAIN_URL=${{ secrets.VITE_API_MAIN_URL }}" >> .env.production
          echo "VITE_ADMIN_EMAILS=${{ secrets.VITE_ADMIN_EMAILS}}" >> .env.production

      - name: 의존성 설치
        run: npm i

      - name: 빌드하기
        run: npm run build

      - name: AWS Resource에 접근할 수 있게 AWS 인증 설정 # 라이브러리 사용
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-region: ap-northeast-2
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}

      - name: S3 기존 파일들 전체 삭제
        run: |
          aws s3 rm --recursive s3://storbit

      - name: S3 에 빌드된 파일 업로드하기
        run: aws s3 cp ./dist s3://storbit/ --recursive

      - name: Cloudfront 캐시 무효화
        run: aws cloudfront create-invalidation --distribution-id E2YEVL0ASNB0W5 --path "/*"

  push-another-repo:
    runs-on: ubuntu-latest
    container: pandoc/latex
    steps:
      - uses: actions/checkout@v2

      - name: Install mustache (to update the date)
        run: apk add ruby && gem install mustache

      - name: creates output
        run: sh ./build.sh

      - name: Pushes to another repository
        id: push_directory
        uses: cpina/github-action-push-to-another-repository@main
        env:
          API_TOKEN_GITHUB: ${{ secrets.AUTO_ACTIONS }}
        with:
          source-directory: 'output'
          destination-github-username: yongarframe
          destination-repository-name: storbit---frontend
          user-email: ${{ secrets.OFFICIAL_ACCOUNT_EMAIL }}
          commit-message: ${{ github.event.commits[0].message }}
          target-branch: develop

      - name: Test get variable exported by push-to-another-repository
        run: echo $DESTINATION_CLONED_DIRECTORY
